services:
  mysql:
    image: mysql:8.0
    container_name: bokexitong-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: personal_blog
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/personal_blog.sql:/docker-entrypoint-initdb.d/01-personal-blog.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bokexitong-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/personal_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      BLOG_JWT_SECRET: ${BLOG_JWT_SECRET:?BLOG_JWT_SECRET is required}
      BLOG_ADMIN_INITIAL_PASSWORD: ${BLOG_ADMIN_INITIAL_PASSWORD:?BLOG_ADMIN_INITIAL_PASSWORD is required}
      BLOG_MAIL_ENABLED: ${BLOG_MAIL_ENABLED:-false}
      BLOG_MAIL_FROM_NAME: ${BLOG_MAIL_FROM_NAME:-博客系统}
      BLOG_ARTICLE_FORBIDDEN_WORDS: ${BLOG_ARTICLE_FORBIDDEN_WORDS:-赌博,色情,毒品,诈骗}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_STARTTLS_ENABLE: ${SPRING_MAIL_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SSL_ENABLE: ${SPRING_MAIL_SSL_ENABLE:-false}
    volumes:
      - upload-data:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: bokexitong-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HTTP_BIND:-80}:80"

volumes:
  mysql-data:
  upload-data:
