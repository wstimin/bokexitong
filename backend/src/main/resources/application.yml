server:
  port: 8080

spring:
  application:
    name: personal-blog-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/personal_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  mail:
    host:
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

blog:
  jwt:
    secret: change-this-secret-to-a-long-random-value-for-production
    expiration-minutes: 1440
  upload-dir: uploads
  web-root: file:./frontend/dist/
  install:
    runtime-config-path: ./config/bokexitong-runtime.properties
    restart-after-install: false
  article:
    forbidden-words: ${BLOG_ARTICLE_FORBIDDEN_WORDS:赌博,色情,毒品,诈骗}
  admin:
    initial-password:
  mail:
    enabled: false
    from-name: 博客系统
