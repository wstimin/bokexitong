server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/personal_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS_ENABLE:true}
          ssl:
            enable: ${SPRING_MAIL_SSL_ENABLE:false}
  servlet:
    multipart:
      max-file-size: ${BLOG_MAX_FILE_SIZE:50MB}
      max-request-size: ${BLOG_MAX_REQUEST_SIZE:55MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

blog:
  jwt:
    secret: ${BLOG_JWT_SECRET:change-this-secret-to-a-long-random-value-for-production}
    expiration-minutes: ${BLOG_JWT_EXPIRATION_MINUTES:1440}
  upload-dir: ${BLOG_UPLOAD_DIR:./uploads}
  web-root: ${BLOG_WEB_ROOT:file:./frontend/dist/}
  install:
    runtime-config-path: ${BOKEXITONG_RUNTIME_CONFIG:./config/bokexitong-runtime.properties}
    restart-after-install: ${BLOG_INSTALL_RESTART_AFTER_INSTALL:false}
  admin:
    initial-password: ${BLOG_ADMIN_INITIAL_PASSWORD:}
  mail:
    enabled: ${BLOG_MAIL_ENABLED:false}
    from-name: ${BLOG_MAIL_FROM_NAME:博客系统}
